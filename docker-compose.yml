services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: politic_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: politic_db
      POSTGRES_USER: admin_politic
      POSTGRES_PASSWORD: UnPasswordSeguro2026
    ports:
      - "5432:5432"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - politic_network

networks:
  politic_network:
    driver: bridge
